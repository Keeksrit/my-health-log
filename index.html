<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>My Health Log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EF;
    --card: #FFFFFF;
    --ink: #1A1A18;
    --ink2: #6B6860;
    --ink3: #B0ADA6;
    --accent: #3D6B4F;
    --accent-light: #E4EFE8;
    --amber: #C4752A;
    --amber-light: #FBF0E4;
    --red: #B83A3A;
    --red-light: #FAEAEA;
    --border: rgba(0,0,0,0.08);
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    padding-bottom: 90px;
  }
  h1, h2 { font-family: 'DM Serif Display', serif; }

  /* Header */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    padding: 52px 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-end; }
  .header h1 { font-size: 26px; color: var(--ink); }
  .header-date { font-size: 13px; color: var(--ink2); margin-top: 2px; }
  .add-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: white; flex-shrink: 0;
    transition: transform 0.15s, background 0.15s;
  }
  .add-btn:active { transform: scale(0.93); background: #2f5340; }

  /* Nav tabs */
  .nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1; padding: 12px 0 10px;
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    color: var(--ink3); font-size: 10px; font-family: 'DM Sans', sans-serif;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 22px; line-height: 1; }

  /* Pages */
  .page { display: none; padding: 16px 20px; }
  .page.active { display: block; }

  /* Section label */
  .sec { font-size: 11px; font-weight: 500; color: var(--ink2); letter-spacing: 0.06em; text-transform: uppercase; margin: 20px 0 10px; }
  .sec:first-child { margin-top: 4px; }

  /* Cards */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .card-row { display: flex; align-items: center; gap: 10px; }
  .card-label { font-size: 15px; color: var(--ink); flex: 1; }
  .card-meta { font-size: 12px; color: var(--ink2); }
  .card-note { font-size: 13px; color: var(--ink2); margin-top: 6px; line-height: 1.5; }

  /* Severity dots */
  .sev { display: flex; gap: 5px; }
  .sev-dot {
    width: 13px; height: 13px; border-radius: 50%;
    background: var(--border);
    transition: background 0.1s;
  }
  .sev-dot.filled-1, .sev-dot.filled-2 { background: var(--accent); }
  .sev-dot.filled-3 { background: var(--amber); }
  .sev-dot.filled-4, .sev-dot.filled-5 { background: var(--red); }

  /* Pill badge */
  .pill {
    font-size: 11px; padding: 3px 9px; border-radius: 20px;
    font-weight: 500;
  }
  .pill-green { background: var(--accent-light); color: var(--accent); }
  .pill-amber { background: var(--amber-light); color: var(--amber); }
  .pill-red { background: var(--red-light); color: var(--red); }
  .pill-gray { background: #F0EDE8; color: var(--ink2); }

  /* Photo thumbnail */
  .photo-strip { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .photo-thumb {
    width: 64px; height: 64px; border-radius: 10px;
    object-fit: cover; border: 1px solid var(--border);
  }

  /* Empty state */
  .empty {
    text-align: center; padding: 48px 20px;
    color: var(--ink2);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty h2 { font-size: 18px; color: var(--ink); margin-bottom: 6px; }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* Calendar */
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .cal-header h2 { font-size: 20px; }
  .cal-nav { background: none; border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 16px; color: var(--ink2); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-day-name { text-align: center; font-size: 10px; color: var(--ink3); padding: 4px 0; font-weight: 500; }
  .cal-cell {
    aspect-ratio: 1; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--ink2); cursor: pointer; transition: background 0.1s;
    position: relative;
  }
  .cal-cell:active { background: #E8E4DC; }
  .cal-cell.today { font-weight: 500; color: var(--ink); }
  .cal-cell.today::after {
    content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%; background: var(--accent);
  }
  .cal-cell.has-entry { background: var(--accent-light); color: var(--accent); font-weight: 500; }
  .cal-cell.has-entry.severity-3 { background: var(--amber-light); color: var(--amber); }
  .cal-cell.has-entry.severity-4, .cal-cell.has-entry.severity-5 { background: var(--red-light); color: var(--red); }
  .cal-cell.other-month { opacity: 0.3; }
  .cal-cell.selected { outline: 2px solid var(--accent); outline-offset: 1px; }

  /* Modal / Sheet */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .overlay.open { display: flex; }
  .sheet {
    background: var(--card); border-radius: 24px 24px 0 0;
    width: 100%; max-width: 430px;
    padding: 20px 20px 40px;
    max-height: 92vh; overflow-y: auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: none; opacity: 1; } }
  .sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 18px; }
  .sheet h2 { font-size: 20px; margin-bottom: 18px; }

  /* Form */
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--ink2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 12px 14px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--ink);
    background: var(--bg); outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group textarea { resize: none; height: 80px; line-height: 1.5; }
  .type-toggle { display: flex; gap: 8px; }
  .type-btn {
    flex: 1; padding: 10px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--bg);
    font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink2);
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .type-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* Severity picker */
  .sev-picker { display: flex; gap: 8px; }
  .sev-btn {
    flex: 1; padding: 10px 0; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--bg);
    font-size: 13px; font-family: 'DM Sans', sans-serif;
    color: var(--ink2); cursor: pointer; text-align: center;
    transition: all 0.15s;
  }
  .sev-btn.active { color: white; border-color: transparent; }
  .sev-btn[data-v="1"].active, .sev-btn[data-v="2"].active { background: var(--accent); }
  .sev-btn[data-v="3"].active { background: var(--amber); }
  .sev-btn[data-v="4"].active, .sev-btn[data-v="5"].active { background: var(--red); }

  /* Photo upload */
  .photo-upload-area {
    border: 1.5px dashed var(--border); border-radius: var(--radius-sm);
    padding: 20px; text-align: center; cursor: pointer;
    color: var(--ink2); font-size: 14px;
    transition: border-color 0.15s, background 0.15s;
  }
  .photo-upload-area:active { border-color: var(--accent); background: var(--accent-light); }
  .photo-preview-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .photo-preview-wrap { position: relative; }
  .photo-preview-wrap img { width: 72px; height: 72px; object-fit: cover; border-radius: 10px; }
  .remove-photo {
    position: absolute; top: -5px; right: -5px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--red); color: white; font-size: 11px;
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  /* Submit btn */
  .submit-btn {
    width: 100%; padding: 15px;
    background: var(--accent); border: none; border-radius: var(--radius-sm);
    font-family: 'DM Serif Display', serif; font-size: 18px; color: white;
    cursor: pointer; margin-top: 8px;
    transition: background 0.15s, transform 0.1s;
  }
  .submit-btn:active { background: #2f5340; transform: scale(0.98); }

  /* Delete btn */
  .delete-btn {
    background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--red); font-size: 13px; padding: 8px 16px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .stat-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--ink); line-height: 1; }
  .stat-label { font-size: 12px; color: var(--ink2); margin-top: 4px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: white; padding: 10px 20px;
    border-radius: 20px; font-size: 14px; opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s; z-index: 300; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Meds taken toggle */
  .med-taken {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1.5px solid var(--border); background: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; flex-shrink: 0;
    transition: all 0.15s;
  }
  .med-taken.done { background: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>My Health Log</h1>
      <div class="header-date" id="headerDate"></div>
    </div>
    <button class="add-btn" onclick="openSheet()" aria-label="Add entry">+</button>
  </div>
</div>

<!-- Pages -->
<div id="page-today" class="page active">
  <div class="sec">Today's entries</div>
  <div id="todayList"></div>
</div>

<div id="page-calendar" class="page">
  <div id="calendarView"></div>
  <div class="sec" id="calDayLabel" style="display:none"></div>
  <div id="calDayEntries"></div>
</div>

<div id="page-stats" class="page">
  <div class="sec">Overview</div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">Total entries</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statDays">0</div>
      <div class="stat-label">Days tracked</div>
    </div>
  </div>
  <div class="sec">Most logged symptoms</div>
  <div id="statSymptoms"></div>
  <div class="sec">Medications</div>
  <div id="statMeds"></div>
</div>

<!-- Nav -->
<nav class="nav">
  <button class="nav-btn active" onclick="switchPage('today', this)">
    <span class="nav-icon">📋</span>Today
  </button>
  <button class="nav-btn" onclick="switchPage('calendar', this)">
    <span class="nav-icon">📅</span>Calendar
  </button>
  <button class="nav-btn" onclick="switchPage('stats', this)">
    <span class="nav-icon">📊</span>Stats
  </button>
</nav>

<!-- Add Entry Sheet -->
<div class="overlay" id="overlay" onclick="closeSheetOnBg(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <h2 id="sheetTitle">New Entry</h2>

    <div class="form-group">
      <label>Type</label>
      <div class="type-toggle">
        <button class="type-btn active" data-type="symptom" onclick="setType('symptom', this)">🩹 Symptom</button>
        <button class="type-btn" data-type="medication" onclick="setType('medication', this)">💊 Medication</button>
        <button class="type-btn" data-type="note" onclick="setType('note', this)">📝 Note</button>
      </div>
    </div>

    <div class="form-group">
      <label id="nameLabel">Symptom name</label>
      <input type="text" id="entryName" placeholder="e.g. Headache" autocomplete="off">
    </div>

    <div class="form-group" id="sevGroup">
      <label>Severity</label>
      <div class="sev-picker" id="sevPicker">
        <button class="sev-btn" data-v="1" onclick="setSev(1)">1</button>
        <button class="sev-btn" data-v="2" onclick="setSev(2)">2</button>
        <button class="sev-btn" data-v="3" onclick="setSev(3)">3</button>
        <button class="sev-btn" data-v="4" onclick="setSev(4)">4</button>
        <button class="sev-btn" data-v="5" onclick="setSev(5)">5</button>
      </div>
    </div>

    <div class="form-group" id="takenGroup" style="display:none">
      <label>Taken?</label>
      <div class="type-toggle">
        <button class="type-btn active" id="takenYes" onclick="setTaken(true)">✓ Yes</button>
        <button class="type-btn" id="takenNo" onclick="setTaken(false)">✗ No / Skipped</button>
      </div>
    </div>

    <div class="form-group">
      <label>Notes (optional)</label>
      <textarea id="entryNote" placeholder="Any details, triggers, context…"></textarea>
    </div>

    <div class="form-group">
      <label>Photos (optional)</label>
      <div class="photo-upload-area" onclick="document.getElementById('photoInput').click()">
        📷 Tap to add photos
      </div>
      <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="handlePhotos(event)">
      <div class="photo-preview-list" id="photoPreviewList"></div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="saveEntry()">Save Entry</button>
    <div style="text-align:center; margin-top:12px;">
      <button class="delete-btn" id="deleteBtn" style="display:none" onclick="deleteEntry()">Delete this entry</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────
let entries = JSON.parse(localStorage.getItem('hl_entries') || '[]');
let editingId = null;
let currentType = 'symptom';
let currentSev = 3;
let currentTaken = true;
let pendingPhotos = []; // base64 strings
let calYear, calMonth;

const today = new Date();
calYear = today.getFullYear();
calMonth = today.getMonth();

// ── Helpers ────────────────────────────────────────────
function save() { localStorage.setItem('hl_entries', JSON.stringify(entries)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function fmtDate(d) { return new Date(d).toLocaleDateString('en-GB', {weekday:'short',day:'numeric',month:'short'}); }
function fmtTime(d) { return new Date(d).toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'}); }
function todayKey() { return today.toISOString().slice(0,10); }
function dateKey(d) { return new Date(d).toISOString().slice(0,10); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Render today ───────────────────────────────────────
function renderToday() {
  const list = document.getElementById('todayList');
  const todays = entries.filter(e => dateKey(e.ts) === todayKey()).sort((a,b) => b.ts - a.ts);
  if (!todays.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🌿</div><h2>Nothing logged yet</h2><p>Tap + to add a symptom,<br>medication, or note.</p></div>`;
    return;
  }
  list.innerHTML = todays.map(entryCard).join('');
}

function entryCard(e) {
  let badge = '';
  let detail = '';
  if (e.type === 'symptom') {
    const sev = e.severity || 1;
    const dots = [1,2,3,4,5].map(i => `<div class="sev-dot ${i<=sev?'filled-'+sev:''}"></div>`).join('');
    badge = `<div class="sev">${dots}</div>`;
  } else if (e.type === 'medication') {
    badge = `<span class="pill ${e.taken ? 'pill-green' : 'pill-red'}">${e.taken ? 'Taken' : 'Skipped'}</span>`;
  } else {
    badge = `<span class="pill pill-gray">Note</span>`;
  }
  if (e.note) detail += `<div class="card-note">${e.note}</div>`;
  if (e.photos && e.photos.length) {
    detail += `<div class="photo-strip">${e.photos.map(p=>`<img class="photo-thumb" src="${p}" alt="photo">`).join('')}</div>`;
  }
  return `<div class="card" onclick="openEdit('${e.id}')">
    <div class="card-row">
      <div class="card-label">${e.name}</div>
      ${badge}
      <span class="card-meta">${fmtTime(e.ts)}</span>
    </div>
    ${detail}
  </div>`;
}

// ── Calendar ───────────────────────────────────────────
function renderCalendar() {
  const view = document.getElementById('calendarView');
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth+1, 0);
  const monthName = firstDay.toLocaleDateString('en-GB', {month:'long', year:'numeric'});

  // Build entry map
  const map = {};
  entries.forEach(e => {
    const k = dateKey(e.ts);
    if (!map[k]) map[k] = {count:0, maxSev:0};
    map[k].count++;
    if (e.severity) map[k].maxSev = Math.max(map[k].maxSev, e.severity);
  });

  let cells = '';
  const dayNames = ['M','T','W','T','F','S','S'];
  cells += dayNames.map(d => `<div class="cal-day-name">${d}</div>`).join('');

  // Offset: Monday-based
  let startDow = firstDay.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1;
  for (let i=0; i<startDow; i++) cells += '<div class="cal-cell other-month"></div>';

  for (let d=1; d<=lastDay.getDate(); d++) {
    const k = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = k === todayKey();
    const info = map[k];
    let cls = 'cal-cell';
    if (isToday) cls += ' today';
    if (info) { cls += ' has-entry'; if (info.maxSev >= 4) cls += ' severity-4'; else if (info.maxSev === 3) cls += ' severity-3'; }
    cells += `<div class="${cls}" onclick="showCalDay('${k}', this)">${d}</div>`;
  }

  view.innerHTML = `
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <h2>${monthName}</h2>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid">${cells}</div>
  `;
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
  document.getElementById('calDayLabel').style.display = 'none';
  document.getElementById('calDayEntries').innerHTML = '';
}

function showCalDay(k, el) {
  document.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  const dayEntries = entries.filter(e => dateKey(e.ts) === k).sort((a,b) => b.ts - a.ts);
  const lbl = document.getElementById('calDayLabel');
  const list = document.getElementById('calDayEntries');
  const d = new Date(k + 'T12:00:00');
  lbl.textContent = d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
  lbl.style.display = 'block';
  list.innerHTML = dayEntries.length ? dayEntries.map(entryCard).join('') : `<div class="card"><div class="card-row"><div class="card-label" style="color:var(--ink2)">No entries this day</div></div></div>`;
}

// ── Stats ──────────────────────────────────────────────
function renderStats() {
  document.getElementById('statTotal').textContent = entries.length;
  const days = new Set(entries.map(e => dateKey(e.ts))).size;
  document.getElementById('statDays').textContent = days;

  const symCount = {};
  const medCount = {};
  entries.forEach(e => {
    if (e.type === 'symptom') symCount[e.name] = (symCount[e.name]||0)+1;
    if (e.type === 'medication') medCount[e.name] = (medCount[e.name]||0)+1;
  });

  const top5sym = Object.entries(symCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const symEl = document.getElementById('statSymptoms');
  symEl.innerHTML = top5sym.length ? top5sym.map(([name,cnt]) => `
    <div class="card" style="padding:10px 16px; margin-bottom:8px;">
      <div class="card-row">
        <div class="card-label">${name}</div>
        <span class="pill pill-gray">${cnt}×</span>
      </div>
    </div>`).join('') : '<div style="color:var(--ink2);font-size:14px;padding:8px 0;">No symptoms logged yet</div>';

  const top5med = Object.entries(medCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const medEl = document.getElementById('statMeds');
  medEl.innerHTML = top5med.length ? top5med.map(([name,cnt]) => `
    <div class="card" style="padding:10px 16px; margin-bottom:8px;">
      <div class="card-row">
        <div class="card-label">${name}</div>
        <span class="pill pill-green">${cnt}×</span>
      </div>
    </div>`).join('') : '<div style="color:var(--ink2);font-size:14px;padding:8px 0;">No medications logged yet</div>';
}

// ── Sheet ──────────────────────────────────────────────
function openSheet(id) {
  editingId = id || null;
  pendingPhotos = [];
  document.getElementById('photoPreviewList').innerHTML = '';
  document.getElementById('photoInput').value = '';

  if (id) {
    const e = entries.find(x => x.id === id);
    if (!e) return;
    document.getElementById('sheetTitle').textContent = 'Edit Entry';
    document.getElementById('submitBtn').textContent = 'Save Changes';
    document.getElementById('deleteBtn').style.display = 'inline-block';
    setType(e.type, document.querySelector(`.type-btn[data-type="${e.type}"]`));
    document.getElementById('entryName').value = e.name;
    document.getElementById('entryNote').value = e.note || '';
    if (e.type === 'symptom') setSev(e.severity || 3);
    if (e.type === 'medication') setTaken(e.taken !== false);
    if (e.photos) {
      pendingPhotos = [...e.photos];
      renderPhotoPreviews();
    }
  } else {
    document.getElementById('sheetTitle').textContent = 'New Entry';
    document.getElementById('submitBtn').textContent = 'Save Entry';
    document.getElementById('deleteBtn').style.display = 'none';
    setType('symptom', document.querySelector('.type-btn[data-type="symptom"]'));
    document.getElementById('entryName').value = '';
    document.getElementById('entryNote').value = '';
    setSev(3);
  }
  document.getElementById('overlay').classList.add('open');
  document.getElementById('entryName').focus();
}

function openEdit(id) { openSheet(id); }

function closeSheet() { document.getElementById('overlay').classList.remove('open'); }
function closeSheetOnBg(e) { if (e.target === document.getElementById('overlay')) closeSheet(); }

function setType(type, btn) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('nameLabel').textContent = type === 'symptom' ? 'Symptom name' : type === 'medication' ? 'Medication name' : 'Title (optional)';
  document.getElementById('entryName').placeholder = type === 'symptom' ? 'e.g. Headache' : type === 'medication' ? 'e.g. Sertraline 50mg' : 'e.g. Doctor visit';
  document.getElementById('sevGroup').style.display = type === 'symptom' ? 'block' : 'none';
  document.getElementById('takenGroup').style.display = type === 'medication' ? 'block' : 'none';
}

function setSev(v) {
  currentSev = v;
  document.querySelectorAll('.sev-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.v) === v);
  });
}

function setTaken(val) {
  currentTaken = val;
  document.getElementById('takenYes').classList.toggle('active', val);
  document.getElementById('takenNo').classList.toggle('active', !val);
}

function handlePhotos(event) {
  const files = Array.from(event.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      pendingPhotos.push(e.target.result);
      renderPhotoPreviews();
    };
    reader.readAsDataURL(file);
  });
}

function renderPhotoPreviews() {
  const list = document.getElementById('photoPreviewList');
  list.innerHTML = pendingPhotos.map((p,i) => `
    <div class="photo-preview-wrap">
      <img src="${p}" alt="preview">
      <button class="remove-photo" onclick="removePhoto(${i})">×</button>
    </div>`).join('');
}

function removePhoto(i) {
  pendingPhotos.splice(i, 1);
  renderPhotoPreviews();
}

function saveEntry() {
  const name = document.getElementById('entryName').value.trim();
  const note = document.getElementById('entryNote').value.trim();
  if (currentType !== 'note' && !name) {
    document.getElementById('entryName').focus();
    showToast('Please enter a name');
    return;
  }

  if (editingId) {
    const idx = entries.findIndex(e => e.id === editingId);
    if (idx > -1) {
      entries[idx] = { ...entries[idx], name: name || 'Note', note, type: currentType,
        severity: currentType === 'symptom' ? currentSev : undefined,
        taken: currentType === 'medication' ? currentTaken : undefined,
        photos: pendingPhotos.length ? pendingPhotos : undefined };
    }
    showToast('Entry updated');
  } else {
    entries.unshift({ id: uid(), ts: Date.now(), type: currentType,
      name: name || 'Note', note,
      severity: currentType === 'symptom' ? currentSev : undefined,
      taken: currentType === 'medication' ? currentTaken : undefined,
      photos: pendingPhotos.length ? pendingPhotos : undefined });
    showToast('Entry saved ✓');
  }
  save();
  closeSheet();
  renderAll();
}

function deleteEntry() {
  if (!editingId) return;
  entries = entries.filter(e => e.id !== editingId);
  save();
  closeSheet();
  renderAll();
  showToast('Entry deleted');
}

// ── Navigation ─────────────────────────────────────────
function switchPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'calendar') renderCalendar();
  if (name === 'stats') renderStats();
}

// ── Init ───────────────────────────────────────────────
function renderAll() { renderToday(); }

document.getElementById('headerDate').textContent = today.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

renderAll();
</script>
